<!DOCTYPE html>

    <link href="css/bootstrap-4.4.1.css" rel="stylesheet">
    
    <style>
        /* 🎨 Estilos Globais e Reset Básico */
        body {
            background-color: #C6C4CC;
            font-size: 1px; /* Mantido, mas estranho */
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-align: center; /* Centraliza o main-container */
        }

        /* 🖼️ Regra Crítica: Imagens 100% Responsivas */
        img {
            max-width: 100%; /* Faz a imagem encolher no celular */
            height: auto; /* Mantém a proporção */
            display: block;
        }

        /* ⚙️ Container Principal (Simula a largura fixa de 900px, mas é flexível) */
        .main-container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto; /* Centraliza todo o conteúdo */
            padding: 1px; /* Simula o cellpadding="1" da tabela principal */
            background-color: #FFFFFF; /* Fundo branco do conteúdo principal */
        }

        /* ---------------------------------------------------- */
        /* 🧭 Menu Principal (3 colunas) */
        /* ---------------------------------------------------- */
        .main-menu {
            display: flex;
            flex-wrap: wrap; 
            justify-content: center; /* Centraliza os botões */
            margin: 1px 0;
        }

        .menu-item {
            /* Largura total no celular para evitar scroll */
            width: 100%; 
            height: 40px; 
            margin: 1px 0; /* Espaçamento entre os botões empilhados */
            text-align: center;
            background-color: #FFFFFF;
        }

        .menu-item a {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* 🖥️ Media Query para Desktop: Volta ao layout de 3 colunas, respeitando as proporções de largura */
        @media (min-width: 600px) {
            .menu-item {
                margin: 0; /* Remove margem extra */
                width: calc(900px / 3); /* Largura padrão de 300px para desktop */
                
                /* Ajustes finos para replicar o original (294px, 294px, 292px) */
                /* Usaremos 33.33% de largura para simplicidade e responsividade */
                width: 33.333%; 
            }
            /* Se for crucial, pode-se usar CSS Grid para larguras diferentes, mas Flexbox é mais limpo: */
            /* .main-menu { grid-template-columns: 294px 294px 292px; } */
        }
        
        /* O botão pg1.png estava em uma linha separada */
        .pg1-button {
            width: 100%;
            height: 40px;
            margin-bottom: 2px;
        }


        /* ---------------------------------------------------- */
        /* 📢 Rodapé de Ícones Sociais (4 colunas) */
        /* ---------------------------------------------------- */
        .social-icons-menu {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around; /* Distribui os 4 ícones */
            padding: 3px 0; /* Simula o cellspacing="3" */
        }

        .social-icon-item {
            width: 25%; /* 4 colunas de 25% no desktop */
            min-width: 20%; /* Ajuste para celular */
            text-align: center;
        }
        
        /* ---------------------------------------------------- */
        /* 📝 Termos e Condições */
        /* ---------------------------------------------------- */
        .termos-rodape {
            background-color: #FFFFFF;
            height: 55px;
            line-height: 55px; /* Centraliza verticalmente */
            font-family: Gotham, 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 1rem;
        }

        .termos-rodape a {
            color: #001DFF;
            font-size: 25px !important;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
        }
    </style>
</head>
