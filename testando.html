<!DOCTYPE html>

    <style>
        /* 🎨 Estilos Globais e Reset Básico */
        body {
            background-color: #C6C4CC;
            /* Mantendo o font-size do body como 1px, mas pode ser problemático para textos normais */
            font-size: 1px; 
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-align: center;
        }

        /* 🖼️ Regra Crítica: Imagens 100% Responsivas */
        img {
            max-width: 100%; /* Faz a imagem encolher no celular */
            height: auto; /* Mantém a proporção */
            display: block;
        }

        /* ⚙️ Container Principal (Simula a largura fixa de 900px, mas é flexível) */
        .main-container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }

        /* 🧭 Menu Principal (3 colunas) */
        .main-menu {
            display: flex;
            flex-wrap: wrap; 
            justify-content: space-between;
            padding: 1px 0; /* Simula o cellpadding="1" */
        }

        .menu-item {
            /* Mobile: Um botão por linha para evitar scroll */
            width: 100%; 
            height: 40px; 
            margin-bottom: 2px;
            text-align: center;
        }

        .menu-item a {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* 🖥️ Media Query para Desktop (3 botões por linha) */
        @media (min-width: 600px) {
            .menu-item {
                /* Divide em 3 colunas, garantindo que caiba */
                width: calc(33.333% - 2px); /* 1px padding + 1px padding */
                margin-bottom: 0;
            }
        }

        /* 📢 Rodapé de Ícones Sociais (4 colunas) */
        .social-icons-menu {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            background-color: #FFFFFF;
        }

        .social-icon-item {
            width: 25%; /* 4 colunas de 25% */
            min-width: 70px; /* Garante que não fiquem muito pequenos, pode ser ajustado */
            height: auto; 
            margin: 1px 0;
            text-align: center;
        }

        /* Fix para o link do rodapé */
        .termos-rodape a {
            font-size: 25px !important; /* Força o tamanho da fonte do link */
            color: #001DFF;
            text-decoration: none;
            display: inline-block;
        }
    </style>
</head>
